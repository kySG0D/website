<div class="form-container">
    <div class="donation-form">
        <h1 class="title">Faz a tua doação</h1>
      
        <form (ngSubmit)="onSubmit()" #donationForm="ngForm">
          <div class="form-group">
            <label for="username">Nome do jogador (in-game)</label>
            <input type="text" id="username" name="username" [(ngModel)]="username" required />
          </div>
      
          <div class="form-group">
            <label for="amount">Seleciona o valor da doação</label>
          
            <div class="select-wrapper">
              <select
                id="amount"
                name="amount"
                [(ngModel)]="amount"
                required
              >
                <option value="20">20€ – 200 000$</option>
                <option value="30">30€ – 300 000$</option>
                <option value="50">50€ – 500 000$</option>
                <option value="100">100€ – 1 000 000$</option>
              </select>
            </div>
          </div>
      
            <div class="form-group">
                <label for="card">Dados do Cartão</label>
                <input type="text" id="card" name="card" [(ngModel)]="card" placeholder="XXXX XXXX XXXX XXXX" required />
            </div>
      
            <button class="submit-btn" type="submit" [disabled]="!donationForm.form.valid">
                <span class="submit-btn-text">Confirmar Doação</span>
            </button>
        </form>
      </div>
</div>
