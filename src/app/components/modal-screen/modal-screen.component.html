<div class="modal-overlay" *ngIf="modal$ | async as modal">
  <div class="modal-box">

    
    <div class="modal-header">
      <div>
        <button class="close-btn" (click)="close()">✕</button>
      </div>
      <h2>{{ modal.title }}</h2>

    </div>

    <div class="modal-body">
      <p>{{ modal.message }}</p>
    </div>

  </div>
</div>
